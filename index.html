<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CORE: INFINITY WAR [FRIENDS UPDATE]</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --bg-deep: #050508;
            --glass: rgba(20, 20, 30, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --cyan: #00f3ff;
            --magenta: #ff0055;
            --gold: #ffd700;
            --boss: #ff3300;
            --friend: #00ff88;
            --font-main: 'Segoe UI', Roboto, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; outline: none; }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%);
        }

        .app-grid {
            display: grid;
            grid-template-columns: 320px 1fr 400px;
            width: 98vw;
            height: 96vh;
            max-width: 1920px;
            gap: 20px;
            z-index: 10;
        }

        .panel {
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.5);
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- SCORE & CORE --- */
        .score-container { text-align: center; margin-bottom: 20px; }
        .main-score {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 243, 255, 0.5));
            font-variant-numeric: tabular-nums;
        }
        .sub-score { font-size: 0.8rem; color: var(--cyan); letter-spacing: 4px; }

        .core-stage {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .the-core {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, var(--cyan) 40%, #000 80%);
            box-shadow: 0 0 80px var(--cyan), inset 0 0 40px rgba(255,255,255,0.8);
            cursor: pointer;
            z-index: 20;
            transition: transform 0.05s cubic-bezier(0.1, 0.7, 1.0, 0.1);
            position: relative;
        }
        .the-core:active { transform: scale(0.92); }
        
        /* Boss Bar */
        .boss-container {
            position: absolute; top: 20px; width: 80%;
            display: none; flex-direction: column; align-items: center;
        }
        .boss-name { color: var(--boss); font-weight: bold; text-shadow: 0 0 10px var(--boss); margin-bottom: 5px; }
        .boss-hp-bar { width: 100%; height: 15px; background: #333; border: 1px solid var(--boss); border-radius: 10px; overflow: hidden; }
        .boss-hp-fill { width: 100%; height: 100%; background: var(--boss); transition: width 0.2s; }

        /* --- UPGRADES (INFINITE SCROLL) --- */
        .scroll-area { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .upgrade-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .upgrade-card:hover:not(.locked) { background: rgba(255,255,255,0.08); transform: translateX(-5px); border-color: var(--cyan); }
        .upgrade-card.locked { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        
        .u-icon { font-size: 1.5rem; margin-right: 15px; width: 40px; text-align: center; }
        .u-info { flex-grow: 1; }
        .u-name { font-weight: bold; font-size: 0.9rem; color: #fff; }
        .u-desc { font-size: 0.75rem; color: #888; }
        .u-cost { font-family: monospace; color: var(--gold); font-weight: bold; }
        .u-count { font-size: 0.8rem; color: #666; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px; margin-left: 10px; }

        /* --- MULTIPLAYER & FRIENDS --- */
        .mp-section { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .my-id-box { 
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; 
            text-align: center; margin-bottom: 10px; cursor: pointer; border: 1px dashed var(--border);
        }
        .my-id-text { color: var(--cyan); font-family: monospace; font-weight: bold; }
        
        .friend-input-group { display: flex; gap: 5px; }
        .mp-input { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 5px; }
        .btn-mp { background: var(--cyan); border: none; border-radius: 5px; color: #000; font-weight: bold; cursor: pointer; padding: 0 15px; }

        .friends-list { margin-top: 10px; }
        .friend-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.2);
            border-radius: 6px; margin-bottom: 5px;
        }
        .friend-status { width: 8px; height: 8px; border-radius: 50%; background: var(--friend); box-shadow: 0 0 5px var(--friend); }

        /* --- REQUEST MODAL --- */
        .request-modal {
            position: fixed; top: 20px; right: 20px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid var(--friend);
            padding: 20px; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 3000;
            transform: translateX(150%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 300px;
        }
        .request-modal.show { transform: translateX(0); }
        .req-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-accept { flex: 1; background: var(--friend); color: #000; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-decline { flex: 1; background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 8px; border-radius: 5px; cursor: pointer; }

        /* --- CANVAS --- */
        #fx-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* --- TOAST --- */
        .toast-area { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: rgba(0,0,0,0.9); border-left: 4px solid var(--cyan); color: #fff; padding: 15px 25px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media (max-width: 1100px) {
            .app-grid { grid-template-columns: 1fr; overflow-y: auto; height: auto; }
            .core-stage { order: -1; min-height: 40vh; }
        }
    </style>
</head>
<body>

<canvas id="fx-canvas"></canvas>

<div class="app-grid">
    <!-- LEFT: STATS -->
    <div class="panel">
        <h2><span style="color:var(--cyan)">●</span> Estadísticas</h2>
        <div class="score-container">
            <div class="main-score" id="ui-score">0</div>
            <div class="sub-score">ENERGÍA TOTAL</div>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom: 20px;">
            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; text-align:center;">
                <div style="font-size:0.7rem; color:#888;">CLIC</div>
                <div style="font-size:1.2rem; font-weight:bold; color:var(--cyan);" id="stat-click">1</div>
            </div>
            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; text-align:center;">
                <div style="font-size:0.7rem; color:#888;">DPS</div>
                <div style="font-size:1.2rem; font-weight:bold; color:var(--magenta);" id="stat-auto">0</div>
            </div>
        </div>

        <div style="margin-top: auto;">
            <button onclick="toggleSettings()" style="width:100%; padding:10px; background:rgba(255,255,255,0.1); border:none; color:#888; border-radius:8px; cursor:pointer;">⚙️ SISTEMA</button>
        </div>
    </div>

    <!-- CENTER: GAME -->
    <div class="panel core-stage">
        <div class="boss-container" id="boss-ui">
            <div class="boss-name">JEFE DE DIMENSIÓN</div>
            <div class="boss-hp-bar"><div class="boss-hp-fill" id="boss-hp"></div></div>
        </div>

        <div class="the-core" id="main-core"></div>
        <div style="margin-top: 30px; color: #666; font-size: 0.8rem; letter-spacing: 2px;">HAZ CLIC PARA GENERAR ENERGÍA</div>
    </div>

    <!-- RIGHT: SHOP & MP -->
    <div class="panel">
        <div class="tabs" style="display:flex; gap:5px; margin-bottom:15px;">
            <button class="tab-btn active" onclick="switchTab('upgrades')" style="flex:1; padding:10px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:#888; border-radius:8px; cursor:pointer;">TIENDA</button>
            <button class="tab-btn" onclick="switchTab('mp')" style="flex:1; padding:10px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:#888; border-radius:8px; cursor:pointer;">🌐 AMIGOS</button>
        </div>

        <div id="tab-upgrades" class="scroll-area tab-content" style="display:block;"></div>
        
        <div id="tab-mp" class="scroll-area tab-content" style="display:none;">
            <div class="mp-section">
                <div style="font-size:0.8rem; color:#aaa; margin-bottom:5px;">TU IDENTIFICADOR:</div>
                <div class="my-id-box" onclick="copyId()">
                    <div class="my-id-text" id="my-player-id">CONECTANDO...</div>
                    <div style="font-size:0.7rem; color:#666; margin-top:2px;">(Click para copiar)</div>
                </div>
            </div>

            <div class="mp-section">
                <div style="font-size:0.8rem; color:#aaa; margin-bottom:5px;">AGREGAR AMIGO:</div>
                <div class="friend-input-group">
                    <input type="text" id="friend-id-input" class="mp-input" placeholder="ID del amigo">
                    <button class="btn-mp" onclick="sendFriendRequest()">ENVIAR</button>
                </div>
            </div>

            <h3 style="font-size: 0.9rem; color: var(--friend); margin-bottom: 10px;">AMIGOS EN LÍNEA</h3>
            <div id="friends-list" class="friends-list">
                <!-- Friends injected here -->
                <div style="color:#666; font-size:0.8rem; text-align:center; padding:10px;">No tienes amigos conectados</div>
            </div>
        </div>
    </div>
</div>

<!-- FRIEND REQUEST POPUP -->
<div class="request-modal" id="req-modal">
    <h3 style="color:var(--friend); margin-bottom:5px;">👋 Solicitud de Amistad</h3>
    <p style="font-size:0.9rem; color:#ccc;"><span id="req-sender">Alguien</span> quiere ser tu amigo.</p>
    <div class="req-actions">
        <button class="btn-accept" onclick="acceptFriend()">ACEPTAR</button>
        <button class="btn-decline" onclick="declineFriend()">RECHAZAR</button>
    </div>
</div>

<div class="toast-area" id="toast-container"></div>

<!-- SETTINGS MODAL -->
<div id="settings-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; display:none; justify-content:center; align-items:center;">
    <div style="background:#111; border:1px solid var(--border); padding:30px; border-radius:20px; width:400px; text-align:center;">
        <h2 style="justify-content:center; border:none; color:#fff;">CONFIGURACIÓN</h2>
        <button onclick="saveGame(true)" style="width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; background:var(--cyan); color:#000;">💾 GUARDAR</button>
        <button onclick="hardReset()" style="width:100%; padding:12px; margin-top:10px; border:1px solid var(--magenta); background:transparent; border-radius:8px; font-weight:bold; cursor:pointer; color:var(--magenta);">☠️ REINICIAR TODO</button>
        <button onclick="toggleSettings()" style="width:100%; padding:12px; margin-top:20px; background:#333; border:none; border-radius:8px; color:#fff; cursor:pointer;">Cerrar</button>
    </div>
</div>

<script>
/**
 * NEON CORE: INFINITY WAR - FRIENDS EDITION
 */

// --- FIREBASE CONFIG (DEMO) ---
// IMPORTANTE: Para uso real, crea tu proyecto en firebase.google.com y reemplaza esto.
const firebaseConfig = {
    apiKey: "AIzaSyB5JjYtqJ_yZ_jZ_jZ_jZ_jZ_jZ_jZ", 
    authDomain: "neon-core-demo.firebaseapp.com",
    databaseURL: "https://neon-core-default-rtdb.firebaseio.com", 
    projectId: "neon-core-demo",
    storageBucket: "neon-core-demo.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef"
};

let db = null;
let isOnline = false;
try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    isOnline = true;
} catch (e) { console.warn("Offline Mode"); }

// --- GAME STATE ---
let G = {
    energy: 0,
    totalEnergy: 0,
    playerId: 'Player_' + Math.floor(Math.random()*100000),
    friends: [], // List of friend IDs
    pendingRequest: null, // ID of person who sent request
    upgrades: [], // Will be populated procedurally
    boss: { active: false, hp: 10000, maxHp: 10000 }
};

let stats = { click: 1, auto: 0 };
let lastTick = Date.now();

// --- PROCEDURAL GENERATION ---
const UPGRADE_PREFIXES = ['Nano', 'Cyber', 'Quantum', 'Plasma', 'Neural', 'Void', 'Solar', 'Dark'];
const UPGRADE_SUFFIXES = ['Bot', 'Chip', 'Core', 'Link', 'Engine', 'Matrix', 'Drive', 'Sphere'];
const ICONS = ['🤖', '💾', '⚡', '🧠', '⚛️', '☀️', '💎', '🚀', '🔭', '🔮'];

function generateUpgrade(tier) {
    const prefix = UPGRADE_PREFIXES[Math.floor(Math.random() * UPGRADE_PREFIXES.length)];
    const suffix = UPGRADE_SUFFIXES[Math.floor(Math.random() * UPGRADE_SUFFIXES.length)];
    const icon = ICONS[Math.floor(Math.random() * ICONS.length)];
    
    const baseCost = 15 * Math.pow(10, tier);
    const basePower = Math.pow(5, tier);
    const type = Math.random() > 0.5 ? 'auto' : 'click';
    
    return {
        id: `gen_${tier}_${Date.now()}`,
        name: `${prefix} ${suffix} MK-${tier+1}`,
        type: type,
        base: basePower,
        cost: baseCost,
        count: 0,
        icon: icon,
        tier: tier
    };
}

// Initialize first 5 tiers
for(let i=0; i<5; i++) G.upgrades.push(generateUpgrade(i));

// --- DOM ELEMENTS ---
const UI = {
    score: document.getElementById('ui-score'),
    click: document.getElementById('stat-click'),
    auto: document.getElementById('stat-auto'),
    core: document.getElementById('main-core'),
    toast: document.getElementById('toast-container'),
    shop: document.getElementById('tab-upgrades'),
    pid: document.getElementById('my-player-id'),
    bossUi: document.getElementById('boss-ui'),
    bossHp: document.getElementById('boss-hp'),
    reqModal: document.getElementById('req-modal'),
    reqSender: document.getElementById('req-sender'),
    friendsList: document.getElementById('friends-list')
};

// --- LOGIC ---
function recalc() {
    let rClick = 1, rAuto = 0;
    G.upgrades.forEach(u => {
        if(u.type === 'click') rClick += u.base * u.count;
        if(u.type === 'auto') rAuto += u.base * u.count;
    });
    stats.click = rClick;
    stats.auto = rAuto;
}

function format(n) {
    if(n >= 1e12) return (n/1e12).toFixed(2)+'T';
    if(n >= 1e9) return (n/1e9).toFixed(2)+'B';
    if(n >= 1e6) return (n/1e6).toFixed(2)+'M';
    if(n >= 1e3) return (n/1e3).toFixed(1)+'K';
    return Math.floor(n).toString();
}

function handleCoreClick(e) {
    if(e.type === 'touchstart') e.preventDefault();
    let power = stats.click;
    G.energy += power;
    G.totalEnergy += power;
    
    spawnText(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2, format(power));
    spawnParticles(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2, 5);
    
    if(G.boss.active) damageBoss(power);
    updateUI();
}

function buyUpgrade(id) {
    const u = G.upgrades.find(x => x.id === id);
    const cost = Math.floor(u.cost * Math.pow(1.15, u.count));
    
    if(G.energy >= cost) {
        G.energy -= cost;
        u.count++;
        
        // Unlock next tier if this one has 10 levels
        if(u.count % 10 === 0) {
            const maxTier = Math.max(...G.upgrades.map(x => x.tier));
            G.upgrades.push(generateUpgrade(maxTier + 1));
            showToast("🔓 NUEVA TECNOLOGÍA", "Se ha desbloqueado una mejora de nivel superior.");
            renderShop();
        }
        
        recalc();
        updateUI();
        // Update specific card only for performance
        renderShop(); 
        syncToCloud();
    }
}

// --- BOSS SYSTEM ---
function checkBossSpawn() {
    if(!G.boss.active && G.totalEnergy > 10000 && Math.random() < 0.001) startBossFight();
}

function startBossFight() {
    G.boss.active = true;
    G.boss.maxHp = G.totalEnergy * 0.1;
    G.boss.hp = G.boss.maxHp;
    UI.bossUi.style.display = 'flex';
    showToast("⚠️ ¡JEFE DETECTADO!", "¡Ataca para derrotarlo!");
}

function damageBoss(dmg) {
    G.boss.hp -= dmg;
    UI.bossHp.style.width = Math.max(0, (G.boss.hp / G.boss.maxHp) * 100) + '%';
    if(G.boss.hp <= 0) {
        G.boss.active = false;
        UI.bossUi.style.display = 'none';
        const reward = G.boss.maxHp * 0.5;
        G.energy += reward;
        G.totalEnergy += reward;
        showToast("🏆 ¡JEFE DERROTADO!", `Recompensa: ${format(reward)}`);
    }
}

// --- MULTIPLAYER & FRIENDS ---
function initMultiplayer() {
    UI.pid.innerText = G.playerId;
    
    // Listen for Friend Requests
    if(isOnline && db) {
        const myRef = db.ref(`users/${G.playerId}`);
        
        // Update my status
        myRef.update({ totalEnergy: G.totalEnergy, lastSeen: Date.now() });
        
        // Listen for incoming requests
        myRef.child('pendingRequest').on('value', (snapshot) => {
            const senderId = snapshot.val();
            if(senderId && senderId !== G.pendingRequest) {
                G.pendingRequest = senderId;
                showRequestModal(senderId);
            }
        });

        // Listen for Friends List updates
        myRef.child('friends').on('value', (snapshot) => {
            const friendsData = snapshot.val();
            renderFriendsList(friendsData);
        });
    }
}

window.sendFriendRequest = function() {
    const targetId = document.getElementById('friend-id-input').value.trim();
    if(!targetId || targetId === G.playerId) return;
    
    if(isOnline && db) {
        // Check if user exists (simple check by setting a request)
        db.ref(`users/${targetId}/pendingRequest`).set(G.playerId)
            .then(() => {
                showToast("📨 SOLICITUD ENVIADA", "Esperando aprobación...");
                document.getElementById('friend-id-input').value = '';
            })
            .catch(err => showToast("❌ ERROR", "ID no encontrado o error de red."));
    }
}

function showRequestModal(senderId) {
    UI.reqSender.innerText = senderId;
    UI.reqModal.classList.add('show');
}

window.acceptFriend = function() {
    if(!G.pendingRequest) return;
    
    // Add me to their list
    db.ref(`users/${G.pendingRequest}/friends/${G.playerId}`).set(true);
    // Add them to my list
    db.ref(`users/${G.playerId}/friends/${G.pendingRequest}`).set(true);
    // Clear request
    db.ref(`users/${G.playerId}/pendingRequest`).remove();
    
    UI.reqModal.classList.remove('show');
    G.pendingRequest = null;
    showToast("✅ AMIGO AGREGADO", "Ahora pueden competir juntos.");
}

window.declineFriend = function() {
    db.ref(`users/${G.playerId}/pendingRequest`).remove();
    UI.reqModal.classList.remove('show');
    G.pendingRequest = null;
}

function renderFriendsList(friendsData) {
    UI.friendsList.innerHTML = '';
    if(!friendsData) {
        UI.friendsList.innerHTML = '<div style="color:#666; font-size:0.8rem; text-align:center; padding:10px;">No tienes amigos conectados</div>';
        return;
    }
    
    Object.keys(friendsData).forEach(friendId => {
        const div = document.createElement('div');
        div.className = 'friend-item';
        div.innerHTML = `
            <span style="color:var(--friend); font-weight:bold;">${friendId}</span>
            <div class="friend-status"></div>
        `;
        UI.friendsList.appendChild(div);
    });
}

window.copyId = function() {
    navigator.clipboard.writeText(G.playerId);
    showToast("📋 COPIADO", "ID copiado al portapapeles");
}

// --- RENDER & LOOP ---
function renderShop() {
    UI.shop.innerHTML = '';
    G.upgrades.forEach(u => {
        const cost = Math.floor(u.cost * Math.pow(1.15, u.count));
        const div = document.createElement('div');
        div.className = `upgrade-card ${G.energy >= cost ? '' : 'locked'}`;
        div.onclick = () => buyUpgrade(u.id);
        div.innerHTML = `
            <div class="u-icon">${u.icon}</div>
            <div class="u-info">
                <div class="u-name">${u.name} <span class="u-count">${u.count}</span></div>
                <div class="u-desc">+${format(u.base)} ${u.type === 'click' ? 'Clic' : 'EPS'}</div>
            </div>
            <div class="u-cost">${format(cost)}</div>
        `;
        UI.shop.appendChild(div);
    });
}

function updateUI() {
    UI.score.innerText = format(G.energy);
    UI.click.innerText = format(stats.click);
    UI.auto.innerText = format(stats.auto);
    
    // Efficient DOM updates for shop
    const cards = UI.shop.children;
    G.upgrades.forEach((u, i) => {
        if(cards[i]) {
            const cost = Math.floor(u.cost * Math.pow(1.15, u.count));
            cards[i].className = `upgrade-card ${G.energy >= cost ? '' : 'locked'}`;
            cards[i].querySelector('.u-cost').innerText = format(cost);
            cards[i].querySelector('.u-count').innerText = u.count;
        }
    });
}

function switchTab(t) {
    document.querySelectorAll('.tab-content').forEach(e => e.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
    document.getElementById(`tab-${t}`).style.display = 'block';
    event.target.classList.add('active');
}

function showToast(title, msg) {
    const d = document.createElement('div');
    d.className = 'toast';
    d.innerHTML = `<b>${title}</b><br><span style="font-size:0.8rem; color:#aaa">${msg}</span>`;
    UI.toast.appendChild(d);
    setTimeout(() => d.remove(), 3000);
}

function toggleSettings() {
    const m = document.getElementById('settings-modal');
    m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
}

// --- PARTICLES ---
const canvas = document.getElementById('fx-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

function spawnParticles(x, y, count) {
    for(let i=0; i<count; i++) {
        particles.push({
            x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
            life: 1, color: Math.random()>0.5 ? '#00f3ff' : '#ff0055'
        });
    }
}

function spawnText(x, y, text) {
    const d = document.createElement('div');
    d.style.position = 'absolute'; d.style.left = x+'px'; d.style.top = y+'px';
    d.style.color = '#fff'; d.style.fontWeight = 'bold'; d.style.pointerEvents = 'none';
    d.style.animation = 'slideUp 0.8s forwards'; d.innerText = '+' + text;
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 800);
}

// --- MAIN LOOP ---
function loop() {
    const now = Date.now();
    const dt = (now - lastTick) / 1000;
    if(dt >= 0.1) {
        if(stats.auto > 0) {
            G.energy += stats.auto * dt;
            G.totalEnergy += stats.auto * dt;
        }
        checkBossSpawn();
        lastTick = now;
    }
    
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
        if(p.life <= 0) particles.splice(i,1);
    }
    
    updateUI();
    requestAnimationFrame(loop);
}

// --- SAVE SYSTEM ---
function saveGame(notify=false) {
    localStorage.setItem('neonInfinitySave', JSON.stringify(G));
    if(notify) showToast("💾 GUARDADO", "Progreso local asegurado.");
}

function loadGame() {
    const s = localStorage.getItem('neonInfinitySave');
    if(s) {
        const parsed = JSON.parse(s);
        // Merge carefully to keep procedural upgrades logic intact
        G = { ...G, ...parsed, upgrades: parsed.upgrades || G.upgrades };
    }
    recalc();
    renderShop();
    initMultiplayer();
}

function hardReset() {
    if(confirm("¿BORRAR TODO?")) {
        localStorage.removeItem('neonInfinitySave');
        location.reload();
    }
}

// --- INIT ---
document.getElementById('main-core').addEventListener('mousedown', handleCoreClick);
document.getElementById('main-core').addEventListener('touchstart', handleCoreClick, {passive:false});

loadGame();
loop();
setInterval(() => { saveGame(); syncToCloud(); }, 10000);

function syncToCloud() {
    if(isOnline && db) {
        db.ref(`users/${G.playerId}`).update({
            totalEnergy: G.totalEnergy,
            lastSeen: Date.now()
        });
    }
}
</script>
